name: "Test websocket"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'v3/websocket/**/*.go'
      - 'v3/websocket/go.mod'
  pull_request:
    paths:
      - 'v3/websocket/**/*.go'
      - 'v3/websocket/go.mod'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
      - name: Run Test
        working-directory: ./v3/websocket
        run: go test -v -race ./...
