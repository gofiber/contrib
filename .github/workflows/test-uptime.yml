name: "Test Uptime"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'v3/uptime/**/*.go'
      - 'v3/uptime/go.mod'
      - 'v3/uptime/go.sum'
  pull_request:
    paths:
      - 'v3/uptime/**/*.go'
      - 'v3/uptime/go.mod'
      - 'v3/uptime/go.sum'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOWORK: off
    strategy:
      matrix:
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: v3/uptime/go.sum
      - name: Run Test
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./v3/uptime
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
