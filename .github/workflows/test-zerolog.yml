name: "Test zerolog"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'v3/zerolog/**/*.go'
      - 'v3/zerolog/go.mod'
  pull_request:
    paths:
      - 'v3/zerolog/**/*.go'
      - 'v3/zerolog/go.mod'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    strategy:
      matrix:
        go-version:
          - 1.25.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
      - name: Run Test
        working-directory: ./v3/zerolog
        run: go test -v -race ./...
