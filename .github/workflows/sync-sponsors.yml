name: Sync Sponsors

# Thin wrapper around the org-level reusable workflow.
# The reusable workflow expects a SPONSORS_TOKEN secret with read:user + read:org.
# contrib hosts two top-level READMEs (root + v3 canonical). Both are passed to
# the reusable workflow, which renders them and lands the update in one commit.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    uses: gofiber/.github/.github/workflows/sync-sponsors.yml@main
    with:
      file: |
        README.md
        v3/README.md
    secrets:
      sponsors-token: ${{ secrets.SPONSORS_TOKEN }}
