name: "Test casbin"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'v3/casbin/**/*.go'
      - 'v3/casbin/go.mod'
      - 'v3/casbin/go.sum'
  pull_request:
    paths:
      - 'v3/casbin/**/*.go'
      - 'v3/casbin/go.mod'
      - 'v3/casbin/go.sum'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOWORK: off
    strategy:
      matrix:
        go-version:
          - 1.25.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: v3/casbin/go.sum
      - name: Run Test
        uses: gofiber/.github/.github/actions/gotestsum@main
        with:
          working-directory: ./v3/casbin
          packages: ./...
          rerun-fails: '2'
          args: -race -count=1
