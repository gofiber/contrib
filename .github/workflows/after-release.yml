name: After Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # When websocket is released, trigger dependabot in self (for socketio dep)
  self-update:
    if: contains(github.event.release.tag_name, 'websocket')
    runs-on: ubuntu-latest
    steps:
      - uses: gofiber/.github/.github/actions/trigger-dependabot@main
        with:
          reason: 'websocket ${{ github.event.release.tag_name }} released'

  # Trigger dependabot in dependent repos for any contrib module release
  notify-dependents:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - gofiber/recipes
    steps:
      - uses: gofiber/.github/.github/actions/trigger-dependabot@main
        with:
          repo: ${{ matrix.repo }}
          reason: 'contrib ${{ github.event.release.tag_name }} released'
          token: ${{ secrets.DISPATCH_TOKEN }}
