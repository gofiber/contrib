name: "Test swaggerui"

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'v3/swaggerui/**/*.go'
      - 'v3/swaggerui/go.mod'
      - 'v3/swaggerui/go.sum'
  pull_request:
    paths:
      - 'v3/swaggerui/**/*.go'
      - 'v3/swaggerui/go.mod'
      - 'v3/swaggerui/go.sum'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOWORK: off
    strategy:
      matrix:
        go-version:
          - 1.25.x
    steps:
      - name: Fetch Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '${{ matrix.go-version }}'
          cache-dependency-path: v3/swaggerui/go.sum
      - name: Run Test
        working-directory: ./v3/swaggerui
        run: go test -v -race ./...
